<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de CURP</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0; /* Un color de fondo suave */
        }
        .contenedor-imagen {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Esto mantiene la proporción y hace que se ajuste a la pantalla */
        }
    </style>
</head>
<body>
    <div class="contenedor-imagen">
        <img src="Captura de pantalla 2026-05-12 141006.png" alt="CURP de Camila Gil Plata">
    </div>
</body>
</html>
